# ==========================================================
# Xray / Hysteria / 3X-UI Performance Profile
# VPS
# Focus: Maximum Performance
# ==========================================================

# ----------------------------------------------------------
# CORE
# ----------------------------------------------------------

net.core.default_qdisc = noqueue
net.core.somaxconn = 4096
net.core.netdev_max_backlog = 250000
net.core.optmem_max = 65536
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rps_sock_flow_entries = 0
net.core.bpf_jit_enable = 1
net.core.bpf_jit_harden = 0

# ----------------------------------------------------------
# TCP
# ----------------------------------------------------------

net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_max_syn_backlog = 9000000
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_dsack = 1
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_moderate_rcvbuf = 1
net.ipv4.tcp_early_retrans = 3
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_tw_reuse = 2
net.ipv4.tcp_max_tw_buckets = 250000
net.ipv4.tcp_abort_on_overflow = 0
net.ipv4.tcp_no_metrics_save = 1
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_fastopen_blackhole_timeout_sec = 0
net.ipv4.tcp_autocorking = 0
net.ipv4.tcp_early_demux = 1
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_ecn = 0

# TCP Buffers

net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 131072 16777216
net.ipv4.tcp_mem = 8192 32768 131072

# ----------------------------------------------------------
# UDP
# ----------------------------------------------------------

net.ipv4.udp_early_demux = 1
net.ipv4.udp_rmem_min = 4096
net.ipv4.udp_wmem_min = 4096

# ----------------------------------------------------------
# IP
# ----------------------------------------------------------

net.ipv4.ip_local_port_range = 10000 65535
net.ipv4.ip_default_ttl = 64
net.ipv4.ip_nonlocal_bind = 1
net.ipv4.ip_autobind_reuse = 1

# ----------------------------------------------------------
# ICMP
# ----------------------------------------------------------

net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_echo_ignore_all = 0

# ----------------------------------------------------------
# ROUTING
# ----------------------------------------------------------

net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1
net.ipv4.conf.default.forwarding = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# ----------------------------------------------------------
# INTERFACE
# ----------------------------------------------------------

net.ipv4.conf.all.accept_local = 1
net.ipv4.conf.default.accept_local = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0
net.ipv4.conf.all.route_localnet = 1
net.ipv4.conf.default.route_localnet = 1
net.ipv4.conf.lo.accept_local = 1
net.ipv4.conf.lo.route_localnet = 1

# ----------------------------------------------------------
# IPV6
# ----------------------------------------------------------

net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.disable_ipv6 = 0
net.ipv6.conf.lo.disable_ipv6 = 0

# ----------------------------------------------------------
# NEIGHBOR CACHE
# ----------------------------------------------------------

net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 4096
net.ipv4.neigh.default.gc_thresh3 = 8192

# ----------------------------------------------------------
# CONNTRACK
# ----------------------------------------------------------

net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_buckets = 65536
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 60
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 30
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_last_ack = 30
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# ----------------------------------------------------------
# FILESYSTEM
# ----------------------------------------------------------

fs.file-max = 1048576
fs.nr_open = 1048576
fs.aio-max-nr = 1048576
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
fs.inotify.max_queued_events = 32768

# ----------------------------------------------------------
# VM
# ----------------------------------------------------------

vm.swappiness = 10
vm.page-cluster = 0
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 2000
vm.dirty_writeback_centisecs = 500
vm.max_map_count = 262144
vm.min_free_kbytes = 16384
vm.overcommit_memory = 1
vm.overcommit_ratio = 100
vm.zone_reclaim_mode = 0

# ----------------------------------------------------------
# KERNEL
# ----------------------------------------------------------

kernel.sched_autogroup_enabled = 0
kernel.pid_max = 131072
kernel.threads-max = 131072
kernel.sysrq = 0

# ----------------------------------------------------------
# Flush
# ----------------------------------------------------------

net.ipv4.route.flush = 3
net.ipv6.route.flush = 3
